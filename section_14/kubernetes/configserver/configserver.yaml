apiVersion: apps/v1
kind: Deployment
metadata:
  name: configserver
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: configserver
  template:
    metadata:
      labels:
        app: configserver
    spec:
      containers:
      - name: configserver
        image: stephenesu/configserver:latest
        ports:
        - containerPort: 8071
        env:
        - name: SPRING_APPLICATION_NAME
          value: "configserver"
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8071
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 10
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8071
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: configserver
  namespace: default
spec:
  selector:
    app: configserver
  ports:
  - port: 8071
    targetPort: 8071
