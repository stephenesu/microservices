apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatewayserver
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatewayserver
  template:
    metadata:
      labels:
        app: gatewayserver
    spec:
      containers:
      - name: gatewayserver
        image: stephenesu/gatewayserver:latest
        ports:
        - containerPort: 8072
        env:
        - name: SPRING_APPLICATION_NAME
          value: "gatewayserver"
        - name: SPRING_CONFIG_IMPORT
          value: "configserver:http://configserver:8071/"
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://eurekaserver:8070/eureka/"
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8072
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 10
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8072
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gatewayserver
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: gatewayserver
  ports:
  - port: 8072
    targetPort: 8072
