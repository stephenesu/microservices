apiVersion: apps/v1
kind: Deployment
metadata:
  name: message
  namespace: eazybank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message
  template:
    metadata:
      labels:
        app: message
    spec:
      containers:
      - name: message
        image: stephenesu/message:latest
        env:
        - name: SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS
          value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: message
  namespace: eazybank
spec:
  selector:
    app: message
  ports:
  - port: 8080
    targetPort: 8080
